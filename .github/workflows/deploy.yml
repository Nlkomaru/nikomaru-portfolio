name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install
        run: pnpm install

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm run test

  deploy-app:
    needs: check
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
    runs-on: ubuntu-latest
    name: Deploy App
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install
        run: pnpm install

      - name: Build app
        run: pnpm run build

      - name: Write Worker secrets file
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const secretNames = [
            "CF_ACCESS_CLIENT_ID",
            "CF_ACCESS_CLIENT_SECRET",
            "R2_PUBLIC_URL",
          ];
          const missingSecretNames = secretNames.filter((name) => !process.env[name]);

          if (missingSecretNames.length > 0) {
            throw new Error(`Missing secrets: ${missingSecretNames.join(", ")}`);
          }

          const secrets = Object.fromEntries(
            secretNames.map((name) => [name, process.env[name]]),
          );

          fs.writeFileSync("app/.deploy-secrets.json", JSON.stringify(secrets));
          EOF

      - name: Deploy app
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --secrets-file .deploy-secrets.json
          workingDirectory: app
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

  deploy-storybook:
    needs: check
    runs-on: ubuntu-latest
    name: Deploy Storybook
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Install
        run: pnpm install

      - name: Build storybook
        run: pnpm run build-storybook

      - name: Deploy storybook
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: storybook
