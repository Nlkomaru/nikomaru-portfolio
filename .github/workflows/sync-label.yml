name: Sync Labels

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.json"

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Prepare labels file
        run: sed -i 's/#//g' .github/labels.json

      - name: Run github-label-setup
        run: pnpm dlx @azu/github-label-setup --token ${{ secrets.GITHUB_TOKEN }} --labels .github/labels.json
