name: Feature request
description: Request a new feature or a meaningful improvement.
title: "[Feature] "
labels:
  - requirement
  - not-reviewed
body:
  - type: markdown
    attributes:
      value: |
        Use this template for feature work and implementation requests.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Describe the request in one sentence.
      placeholder: Example: Add GitHub issue operations workflow for repository maintenance
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background
      description: Explain why this change is needed.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe the expected implementation scope.
      placeholder: |
        - Create issue templates
        - Sync labels from labels.json
        - Run Biome in a git hook
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the completion conditions.
      placeholder: |
        - [ ] Issue templates exist under .github/ISSUE_TEMPLATE
        - [ ] labels.json can sync labels through GitHub Actions
        - [ ] pre-commit runs biome check
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the main area impacted by this issue.
      options:
        - projects
        - talks
        - pictures
        - about
        - design-system
        - tooling
        - i18n
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add links, references, or constraints.
